[job]
dump_folder = "./outputs_qwen3_1_7b"
description = "Qwen 3 1.7B training"

[profiling]
enable_profiling = false
save_traces_folder = "profile_trace"
profile_freq = 100

[metrics]
log_freq = 10
enable_tensorboard = false
save_tb_folder = "tb"

[model]
name = "qwen3"
flavor = "1.7B"
hf_assets_path = "./assets/hf/Qwen3-1.7B"
# converters = ["float8"]

[optimizer]
name = "AdamW"
lr = 8e-4
eps = 1e-8

[lr_scheduler]
warmup_steps = 400  # lr scheduler warm up, 20% total steps

[training]
local_batch_size = 1
seq_len = 4096
max_norm = 1.0  # grad norm clipping
steps = 2000
dataset = "synth"

[validation]
enable = true
dataset = "synth_validation"
seq_len = 4096
freq = 250
steps = 10
local_batch_size = 1

[parallelism]
data_parallel_replicate_degree = 16
data_parallel_shard_degree = 1
fsdp_reshard_after_forward = "never" # default / never / always
tensor_parallel_degree = 1
context_parallel_degree = 1

[checkpoint]
enable = true
folder = "checkpoint"
interval = 100
last_save_model_only = false
export_dtype = "float16"
async_mode = "async_with_pinned_mem" # ["disabled", "async", "async_with_pinned_mem"]

[activation_checkpoint]
mode = "selective"  # ["none", "selective", "full"]
selective_ac_option = "op"  # "int" = ac every positive int layer or 'op', ac based on ops policy

[compile]
enable=true
components = ["model", "loss"]

[quantize.linear.float8]
enable_fsdp_float8_all_gather = false
precompute_float8_dynamic_scale_for_fsdp = false
filter_fqns = ["output"]